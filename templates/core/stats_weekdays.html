{% extends "base.html" %} 
{% load static %} 
{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/stats_weekdays.css' %}" />
{% endblock %} 
{% block title %}Статистика по дням{% endblock %} 

{% block content %}
<div class="container mt-4">
  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="m-0">Статистика по дням недели</h4>
  </div>

  <!-- FILTERS -->
  <div class="card p-3 mb-4">
    <div class="row g-3 align-items-end">
      <!-- MIN COUNT -->
      <div class="col-auto">
        <label class="form-label">Мин. повторений</label>
        <input
          type="number"
          id="min-count"
          class="form-control"
          value="3"
          min="1"
        />
      </div>

      <!-- EXCLUDE DAILY -->
      <div class="col-auto">
        <div class="form-check mt-4">
          <input
            class="form-check-input"
            type="checkbox"
            id="exclude-daily"
            checked
          />
          <label class="form-check-label"> Убрать ежедневные </label>
        </div>
      </div>
    </div>
  </div>

  <!-- DATA -->
  <div id="stats-container" class="d-flex flex-column gap-3">
    <!-- JS вставляет сюда -->
  </div>
</div>

{% endblock %} {% block page_js %}
    <script src="{% static 'js/stats_weekdays.js' %}"></script>
{% endblock %}
